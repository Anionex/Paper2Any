# EchoMimic API 反向代理：单入口 8200，轮询 8 个后端。
#
# 重要：若后端日志里完全没有 Nginx 的请求，多半是 Nginx 在缓冲请求体时失败。
#   Nginx 错误日志会看到：pwrite() "/var/lib/nginx/body/..." failed (28: No space left on device)
# 即 /var（或 /var/lib/nginx）所在分区磁盘满了，请求体写不进去，Nginx 直接 500，请求从未到后端。
# 解决：1) 腾出 /var 所在分区空间；2) 本配置里已设 proxy_request_buffering off，不把 body 写盘，直接流式转给后端。
#
# 部署：sudo cp .../script/nginx_echomimic.conf /etc/nginx/conf.d/echomimic.conf && sudo nginx -t && sudo nginx -s reload

upstream echomimic_backend {
    server 127.0.0.1:8040 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8041 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8050 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8051 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8052 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8060 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8061 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8062 max_fails=2 fail_timeout=30s;
}

server {
    listen 8200;
    server_name localhost;

    client_max_body_size 200M;

    error_page 500 502 503 504 =500 @no_50x_html;
    location @no_50x_html {
        internal;
        default_type application/json;
        add_header X-Backend $upstream_addr always;
        add_header X-Upstream-Status $upstream_status always;
        return 500 '{"detail":"upstream error, see X-Backend header and echomimic_api_<port>.log or nginx error.log"}';
    }

    location / {
        proxy_pass http://echomimic_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Backend $upstream_addr always;
        add_header X-Upstream-Status $upstream_status always;

        proxy_intercept_errors off;
        proxy_next_upstream_tries 1;

        # 关键：不把请求体缓冲到 /var/lib/nginx/body，避免「No space left on device」导致请求从未到后端
        proxy_request_buffering off;
        proxy_buffering off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 920s;
        proxy_read_timeout 920s;
    }
}
